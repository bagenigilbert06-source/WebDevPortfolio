  </defs>
  <rect width="1200" height="750" fill="url(#background)"/>
  <circle cx="1040" cy="100" r="250" fill="#22c55e" opacity=".07"/>
  <circle cx="120" cy="690" r="310" fill="#4ade80" opacity=".05"/>
