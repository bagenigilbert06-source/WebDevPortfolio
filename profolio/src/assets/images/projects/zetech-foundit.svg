  <desc id="desc">A green check mark beside the Zetech Foundit name on a dark green background.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a12"/>
      <stop offset="1" stop-color="#123d28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7a1"/>
      <stop offset="1" stop-color="#16a34a"/>
