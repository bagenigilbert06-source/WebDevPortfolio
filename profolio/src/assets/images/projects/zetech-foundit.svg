  <text x="505" y="382" fill="#a7c7b4" font-family="Arial, Helvetica, sans-serif" font-size="30">Lost it? Found it. Return it.</text>
  <rect x="505" y="432" width="258" height="66" rx="33" fill="#22c55e"/>
  <text x="634" y="475" fill="#052e16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">CAMPUS LOST &amp; FOUND</text>
